<div class="container py-5">
  <div class="text-center mb-5 animate-fade">
    <div style="font-size: 3.5rem;">📚</div>
    <h1 class="fw-bold">Accessible Reading List</h1>
    <p class="text-muted fs-5">Manage and browse your library collection with ease.</p>
  </div>

  <div class="row justify-content-center g-4">
    <div class="col-md-5">
      <div class="arl-card h-100 p-4 text-center">
        <div style="font-size: 2.5rem;">📖</div>
        <h5 class="card-title mt-2">Manage Books</h5>
        <p class="text-muted">Add, update, or remove books from the collection. (Login required)</p>
        <button class="btn btn-arl px-4" routerLink="/book">Manage Books</button>
      </div>
    </div>

    <div class="col-md-5">
      <div class="arl-card h-100 p-4 text-center">
        <div style="font-size: 2.5rem;">🔍</div>
        <h5 class="card-title mt-2">Browse Library</h5>
        <p class="text-muted">Search and explore all the books available in the database.</p>
        <button class="btn btn-arl-outline px-4" routerLink="/library">Open Library</button>
      </div>
    </div>
  </div>
</div>
