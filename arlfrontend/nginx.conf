server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    # Angular's client-side rendering entry point.
    index index.csr.html;

    # SPA routing: serve static assets if present, otherwise the app shell
    # so Angular's router can handle the route on the client.
    location / {
        try_files $uri $uri/ /index.csr.html;
    }

    # Long-cache hashed build artifacts.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
    }
}
