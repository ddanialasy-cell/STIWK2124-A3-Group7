# Test profile: use an in-memory H2 database so tests run without MySQL.
spring.datasource.url=jdbc:h2:mem:arl_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Don't run the MySQL-flavoured schema.sql / data.sql during tests.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
